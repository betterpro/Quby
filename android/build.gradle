allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

// Force compileSdk on all sub-modules that don't declare it (e.g. app_links)
subprojects {
    afterEvaluate {
        if (it.plugins.hasPlugin("com.android.library") ||
            it.plugins.hasPlugin("com.android.application")) {
            android {
                compileSdk 35
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
