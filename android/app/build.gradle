plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.quby.app"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "com.quby.app"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        def mapsApiKey = ""
        if (project.hasProperty("dart-defines")) {
            project.property("dart-defines").split(",").each { entry ->
                def decoded = new String(entry.decodeBase64(), "UTF-8")
                if (decoded.startsWith("GOOGLE_MAPS_API_KEY=")) {
                    mapsApiKey = decoded.substring("GOOGLE_MAPS_API_KEY=".length())
                }
            }
        }
        if (mapsApiKey.isEmpty()) {
            def definesFile = rootProject.file("../dart-defines.json")
            if (definesFile.exists()) {
                def json = new groovy.json.JsonSlurper().parse(definesFile)
                mapsApiKey = json.GOOGLE_MAPS_API_KEY ?: ""
            }
        }
        manifestPlaceholders.googleMapsApiKey = mapsApiKey
    }

    signingConfigs {
        release {
            def keystoreFile = System.getenv("RELEASE_KEYSTORE_PATH")
            if (keystoreFile) {
                storeFile = file(keystoreFile)
                storePassword = System.getenv("KEY_STORE_PASSWORD")
                keyAlias = System.getenv("KEY_ALIAS")
                keyPassword = System.getenv("KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            def hasKeystore = System.getenv("RELEASE_KEYSTORE_PATH") != null
            signingConfig = hasKeystore ? signingConfigs.release : signingConfigs.debug
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation "com.google.android.material:material:1.12.0"
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

flutter {
    source = "../.."
}
