name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_HOME" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT"  >> android/local.properties

      - name: Patch app_links compileSdk
        run: |
          find "$HOME/.pub-cache" -name "build.gradle" -path "*/app_links*" \
            -exec sed -i \
              's/compileSdk = flutter\.compileSdkVersion/compileSdk 35/g' {} +

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quby-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
