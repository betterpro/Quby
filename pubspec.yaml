name: quby_app
description: "Quby — smart wallet for everyday spending, splitting, and earning."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  google_fonts: ^6.3.2
  flutter_svg: ^2.1.0
  supabase_flutter: ^2.9.0
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^8.0.0
  crypto: ^3.0.3
  shared_preferences: ^2.5.5
  uuid: ^4.5.1
  google_maps_flutter: ^2.17.1
  google_maps_flutter_android: ^2.18.0
  google_maps_flutter_platform_interface: ^2.14.0
  geolocator: ^14.0.2
  flutter_stripe: ^11.5.0
  mobile_scanner: ^7.0.1
  http: ^1.2.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0F1A"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  adaptive_icon_foreground_inset: 16
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
